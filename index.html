<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>PDF Editor — Free, Private, In-Browser PDF Toolkit</title>
    <meta
      name="description"
      content="A free, open-source, privacy-first PDF editor that runs entirely in your browser. Merge, split, rotate, sign, watermark, lock/unlock, select & extract text — nothing is ever uploaded."
    />
    <meta
      name="keywords"
      content="PDF editor, edit PDF, merge PDF, split PDF, sign PDF, PDF password, unlock PDF, watermark, extract text, browser PDF, free PDF tool, privacy, no upload"
    />
    <meta name="author" content="anitacarolinn" />
    <meta name="theme-color" content="#d97706" />
    <meta name="color-scheme" content="light" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pdf-editor-fwq.pages.dev/" />

    <!-- Icons (favicon) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#d97706" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PDF Editor" />
    <meta property="og:title" content="PDF Editor — Free, Private, In-Browser PDF Toolkit" />
    <meta
      property="og:description"
      content="Edit, sign & lock PDFs right in your browser. No uploads, no accounts, no servers — your files never leave your device."
    />
    <meta property="og:url" content="https://pdf-editor-fwq.pages.dev/" />
    <meta property="og:image" content="https://pdf-editor-fwq.pages.dev/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PDF Editor — free, private, in-browser PDF toolkit" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_TW" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PDF Editor — Free, Private, In-Browser PDF Toolkit" />
    <meta
      name="twitter:description"
      content="Edit, sign & lock PDFs right in your browser. No uploads — your files never leave your device."
    />
    <meta name="twitter:image" content="https://pdf-editor-fwq.pages.dev/og-image.png" />
    <meta name="twitter:image:alt" content="PDF Editor — free, private, in-browser PDF toolkit" />

    <!-- Some deps (e.g. react-rnd) reference process.env at runtime; the browser
         has no `process`, which crashes the editor. Provide a minimal shim. -->
    <script>window.process = window.process || { env: { NODE_ENV: 'production' } };</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
